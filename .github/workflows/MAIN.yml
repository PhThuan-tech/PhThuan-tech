name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"   # chạy mỗi 6 tiếng
  workflow_dispatch:

permissions:
  contents: write   # 🔥 cho phép bot push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Lấy code repo
      - name: Checkout
        uses: actions/checkout@v4

      # Generate snake
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: PhThuan-tech
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake.gif

      # Deploy lên branch "output"
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
